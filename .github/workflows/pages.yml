# pages.yml — deploy the docs/ landing page to GitHub Pages.
#
# Actions-based deploy (build_type: workflow), replacing the legacy branch
# build, whose deploy backend failed opaquely ("try again later",
# error_count: 10) on this fresh repo twice in a row. This path uploads the
# static docs/ tree as the Pages artifact and deploys it with full logs.
# Actions SHA-pinned, matching gates.yml convention.
name: pages
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
